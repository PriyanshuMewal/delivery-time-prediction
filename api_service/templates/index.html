<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery Time Prediction</title>
</head>

<body>

<h2>Delivery Time Prediction</h2>

<form method="post" action="/predict">

    <label>Driver Age</label><br>
    <input type="number" name="driver_age" min="18" max="65"><br><br>

    <label>Driver Rating</label><br>
    <input type="number" name="driver_rating" step="0.1" min="1" max="5"><br><br>

    <label>Restaurant Latitude</label><br>
    <input type="number" step="any" value="30.2" name="rest_lat" min="8.4" max="37.6" required><br><br>

    <label>Restaurant Longitude</label><br>
    <input type="number" step="any" value="75.5" name="rest_long" min="68.7" max="97.25" required><br><br>

    <label>Destination Latitude</label><br>
    <input type="number" step="any" value="26.5" name="delivery_lat" min="8.4" max="37.6" required><br><br>

    <label>Destination Longitude</label><br>
    <input type="number" step="any" value="72.56" name="delivery_long" min="68.7" max="97.25" required><br><br>

    <label>Weather</label><br>
    <select name="weather">
        <option value="">Select</option>
        <option value="sunny">Sunny</option>
        <option value="cloudy">Cloudy</option>
        <option value="fog">Fog</option>
        <option value="stormy">Stormy</option>
        <option value="windy">Windy</option>
        <option value="sandstorms">Sandstorms</option>
    </select><br><br>

    <label>Traffic</label><br>
    <select name="traffic">
        <option value="">Select</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="jam">Jam</option>
    </select><br><br>

    <label>Vehicle Condition (0-3)</label><br>
    <input type="number" step="1" value="1" name="vehicle_condition" min="0" max="3" required><br><br>

    <label>Order Type</label><br>
    <select name="order_type" required>
        <option value="snack">Snack</option>
        <option value="meal">Meal</option>
        <option value="drink">Drink</option>
        <option value="buffet">Buffet</option>
    </select><br><br>

    <label>Vehicle Type</label><br>
    <select name="vehicle_type" required>
        <option value="motorcycle">Motorcycle</option>
        <option value="scooter">Scooter</option>
        <option value="electric_scooter">Electric Scooter</option>
        <option value="bicycle">Bicycle</option>
    </select><br><br>

    <label>Multiple Deliveries</label><br>
    <select name="multi_deliveries">
        <option value="">SELECT</option>
        <option value="0">One</option>
        <option value="1">Two</option>
        <option value="2">Three</option>
        <option value="3">Four</option>
    </select><br><br>

    <label>Festival</label><br>
    <select name="festival">
        <option value="">Select</option>

        <option value="no">No</option>
        <option value="yes">Yes</option>
    </select><br><br>

    <label>City Type</label><br>
    <select name="city_type">
        <option value="">Select</option>
        <option value="Urban">Urban</option>
        <option value="Semi-Urban">Semi-Urban</option>
        <option value="Metropolitan">Metropolitan</option>
    </select><br><br>

    <label>Order Date</label><br>
    <input type="date" value="23-11-2020" name="date" required><br><br>

    <label>Order Time</label><br>
    <input type="time" value="11:30" name="order_time" required><br><br>

    <label>Picked Time</label><br>
    <input type="time" value="12:00" name="picked_time" required><br><br>

    <button type="submit">Predict Delivery Time</button>

    {% if time %}
        <h3>It would take nearly {{time}} minutes for the delivery to arrive.</h3>
    {% endif %}

</form>

</body>
</html>
