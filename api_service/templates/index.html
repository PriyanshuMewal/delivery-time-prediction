<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery Time Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>

<body>

<div class="page-container">

    <h2>Delivery Time Prediction</h2>

    <form method="post" action="/predict">

        <div class="form-grid">

            <!-- LEFT COLUMN -->
            <div class="form-section">
                <h4>Driver & Environment</h4>

                <label>Driver Age</label>
                <input type="number" name="driver_age" min="18" max="65"
                       step="1" title="Age must be an integer between 18 and 65">

                <label>Driver Rating</label>
                <input type="number" step="0.1" name="driver_rating" min="1"
                       max="5" title="Rating must be between 1 and 5">

                <label>Weather</label>
                <select name="weather">
                    <option value="">Select</option>
                    <option value="sunny">Sunny</option>
                    <option value="cloudy">Cloudy</option>
                    <option value="fog">Fog</option>
                    <option value="stormy">Stormy</option>
                    <option value="windy">Windy</option>
                    <option value="sandstorms">Sandstorms</option>
                </select>

                <label>Traffic</label>
                <select name="traffic">
                    <option value="">Select</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="jam">Jam</option>
                </select>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="form-section">
                <h4>Location & Time</h4>

                <label>Restaurant Latitude</label>
                <input type="number" step="any" name="rest_lat" max="37.6"
                       required min="8.4" value="">

                <label>Restaurant Longitude</label>
                <input type="number" step="any" name="rest_long" max="97.25"
                       required min="68.7">

                <label>Destination Latitude</label>
                <input type="number" step="any" name="delivery_lat" max="37.6"
                       required min="8.4">

                <label>Destination Longitude</label>
                <input type="number" step="any" name="delivery_long" max="97.25"
                       required min="68.7">

                <label>Order Date</label>
                <input type="date" name="date" required>

                <label>Order Time</label>
                <input type="time" name="order_time" required>

                <label>Picked Time</label>
                <input type="time" name="picked_time" required>
            </div>

            <!-- FULL WIDTH SECTION -->
            <div class="form-section full-width">
                <h4>Order Details</h4>

                <label>Vehicle Condition</label>
                <input type="number" name="vehicle_condition" min="1"
                       max="3" step="1" required>

                <label>Order Type</label>
                <select name="order_type">
                    <option value="snack">Snack</option>
                    <option value="meal">Meal</option>
                    <option value="drink">Drink</option>
                    <option value="buffet">Buffet</option>
                </select>

                <label>Vehicle Type</label>
                <select name="vehicle_type">
                    <option value="motorcycle">Motorcycle</option>
                    <option value="scooter">Scooter</option>
                    <option value="electric_scooter">Electric Scooter</option>
                    <option value="bicycle">Bicycle</option>
                </select>

                <label>Multiple Deliveries</label>
                <select name="multi_deliveries">
                    <option value="">Select</option>
                    <option value="0">One</option>
                    <option value="1">Two</option>
                    <option value="2">Three</option>
                    <option value="3">Four</option>
                </select>

                <label>Festival</label>
                <select name="festival">
                    <option value="">Select</option>
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                </select>

                <label>City Type</label>
                <select name="city_type">
                    <option value="">Select</option>
                    <option value="urban">Urban</option>
                    <option value="Semi-Urban">Semi-Urban</option>
                    <option value="metropolitan">Metropolitan</option>
                </select>
            </div>

        </div>

        <button type="submit">Predict Delivery Time</button>

        {% if time %}
            <h3>It would take nearly {{ time }} minutes for the delivery to arrive.</h3>
        {% endif %}

    </form>

</div>

</body>
</html>
