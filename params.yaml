data_ingestion:

  test_size: 0.2

feature_engineering:

  const_imputation:
    strategy: "constant"
    fill_value: "missing"

  iterative_imputation:
    estimator: "LGBMRegressor"
    max_iter: 15

  lightgbm_params:
    n_estimators: 300
    max_depth: -1
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    verbosity: -1

  ordinal_encoder:
    unknown_value: -1

  onehot_encoder:
    drop: "first"
    handle_unknown: "ignore"
    sparse_output: False
