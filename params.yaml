data_ingestion:

  test_size: 0.2

feature_engineering:

  const_imputation:
    strategy: "constant"
    fill_value: "missing"

  iterative_imputation:
    estimator: "LGBMRegressor"
    max_iter: 15

  lgbm_estimator:
    n_estimators: 300
    max_depth: -1
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    verbose: -1

  ordinal_encoder:
    unknown_value: -1

  onehot_encoder:
    drop: "first"
    handle_unknown: "ignore"
    sparse_output: False

model_building:

  "n_estimators": 1043
  "learning_rate": 0.01184348616544254
  "num_leaves": 137
  "max_depth": 11
  "min_child_samples": 23
  "feature_fraction": 0.7839333790779994
  "bagging_fraction": 0.9697068541421031
  "lambda_l1": 3.972979937157174e-08
  "lambda_l2": 2.639574087334251e-08
  "verbose": -1